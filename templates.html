<section>
  <h2>模板库</h2>
  <div style="margin-bottom:16px;">
    <input type="text" id="searchInput" placeholder="搜索模板...">
    <select id="categoryFilter">
      <option value="all">全部类别</option>
    </select>
    <button class="btn" id="clearBtn">清除</button>
  </div>
</section>

<div id="template-list"></div>

<template id="cardTemplate">
  <article class="card">
    <h3 class="card-title"></h3>
    <p class="card-desc"></p>
    <button class="btn" class="load-btn">加载到编辑器</button>
  </article>
</template>

<script>
  const templates = [
    {id:'approval',name:'审批流程',category:'办公',desc:'包含提交、审核、批准三个节点的标准审批流程。',
     data:{nodes:[{id:'n1',type:'start',x:100,y:80},{id:'n2',type:'task',label:'提交',x:300,y:80},{id:'n3',type:'task',label:'审核',x:500,y:80},{id:'n4',type:'task',label:'批准',x:700,y:80},{id:'n5',type:'end',x:900,y:80}],edges:[{from:'n1',to:'n2'},{from:'n2',to:'n3'},{from:'n3',to:'n4'},{from:'n4',to:'n5'}]}},
    {id:'order',name:'订单处理',category:'商务',desc:'从下单到发货的完整流程。',
     data:{nodes:[{id:'o1',type:'start',x:120,y:60},{id:'o2',type:'task',label:'下单',x:300,y:60},{id:'o3',type:'task',label:'付款',x:480,y:60},{id:'o4',type:'task',label:'备货',x:660,y:60},{id:'o5',type:'task',label:'发货',x:840,y:60},{id:'o6',type:'end',x:1020,y:60}],edges:[{from:'o1',to:'o2'},{from:'o2',to:'o3'},{from:'o3',to:'o4'},{from:'o4',to:'o5'},{from:'o5',to:'o6'}]}},
    {id:'bug',name:'Bug修复',category:'研发',desc:'发现、分配、修复、验证闭环。',
     data:{nodes:[{id:'b1',type:'start',x:100,y:100},{id:'b2',type:'task',label:'发现',x:280,y:100},{id:'b3',type:'task',label:'分配',x:460,y:100},{id:'b4',type:'task',label:'修复',x:640,y:100},{id:'b5',type:'task',label:'验证',x:820,y:100},{id:'b6',type:'end',x:1000,y:100}],edges:[{from:'b1',to:'b2'},{from:'b2',to:'b3'},{from:'b3',to:'b4'},{from:'b4',to:'b5'},{from:'b5',to:'b6'}]}},
    {id:'signup',name:'用户注册',category:'产品',desc:'访问、填写、验证、激活。',
     data:{nodes:[{id:'s1',type:'start',x:80,y:80},{id:'s2',type:'task',label:'访问注册页',x:260,y:80},{id:'s3',type:'task',label:'填写信息',x:440,y:80},{id:'s4',type:'task',label:'邮件验证',x:620,y:80},{id:'s5',type:'task',label:'账号激活',x:800,y:80},{id:'s6',type:'end',x:980,y:80}],edges:[{from:'s1',to:'s2'},{from:'s2',to:'s3'},{from:'s3',to:'s4'},{from:'s4',to:'s5'},{from:'s5',to:'s6'}]}},
    {id:'feedback',name:'反馈处理',category:'服务',desc:'收集、分类、处理、回复。',
     data:{nodes:[{id:'f1',type:'start',x:100,y:120},{id:'f2',type:'task',label:'收集反馈',x:280,y:120},{id:'f3',type:'task',label:'分类',x:460,y:120},{id:'f4',type:'task',label:'处理',x:640,y:120},{id:'f5',type:'task',label:'回复',x:820,y:120},{id:'f6',type:'end',x:1000,y:120}],edges:[{from:'f1',to:'f2'},{from:'f2',to:'f3'},{from:'f3',to:'f4'},{from:'f4',to:'f5'},{from:'f5',to:'f6'}]}},
  ];

  const templateList = document.getElementById('template-list');
  const searchInput = document.getElementById('searchInput');
  const categoryFilter = document.getElementById('categoryFilter');
  const clearBtn = document.getElementById('clearBtn');
  const cardTemplate = document.getElementById('cardTemplate');

  function render() {
    const query = searchInput.value.trim().toLowerCase();
    const category = categoryFilter.value;

    const filtered = templates.filter(t => {
      const matchesQuery = t.name.toLowerCase().includes(query) || t.desc.toLowerCase().includes(query);
      const matchesCat = category === 'all' || t.category === category;
      return matchesQuery && matchesCat;
    });

    templateList.innerHTML = '';
    if (filtered.length === 0) {
      const empty = document.createElement('p');
      empty.textContent = '未找到匹配的模板';
      empty.style.textAlign = 'center';
      empty.style.color = '#777';
      templateList.appendChild(empty);
      return;
    }

    filtered.forEach(t => {
      const clone = cardTemplate.content.cloneNode(true);
      const card = clone.querySelector('.card');
      card.querySelector('.card-title').textContent = t.name;
      card.querySelector('.card-desc').textContent = t.desc;
      const loadBtn = card.querySelector('.load-btn');
      loadBtn.dataset.template = JSON.stringify(t.data);
      loadBtn.addEventListener('click', () => {
        // 跳转到编辑器页并带上模板id
        window.location.href = `index.html?id=${t.id}`;
      });
      templateList.appendChild(card);
    });
  }

  // 初始化类别下拉
  (() => {
    const categories = [...new Set(templates.map(t => t.category))];
    categories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      categoryFilter.appendChild(opt);
    });
  })();

  searchInput.addEventListener('input', render);
  categoryFilter.addEventListener('change', render);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    categoryFilter.value = 'all';
    render();
  });

  render();
</script>
